<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Competition</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ═══════════════════════════════════════════════════ -->
    <!-- HUD VIEW — Flight HUD + Countdown                 -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="hud-view" class="view hidden">
        <!-- Countdown overlay -->
        <div id="countdown-overlay" class="hidden">
            <div id="countdown-number"></div>
        </div>

        <!-- HUD panel (top right) -->
        <div id="hud-panel">
            <div class="hud-title">✈️ LANDING COMPETITION</div>
            <div class="hud-row">
                <span class="hud-label">Avião</span>
                <span id="hud-plane" class="hud-value">---</span>
            </div>
            <div class="hud-row">
                <span class="hud-label">Tempo</span>
                <span id="hud-timer" class="hud-value">5:00</span>
            </div>
            <div class="hud-row">
                <span class="hud-label">Jogadores</span>
                <span id="hud-players" class="hud-value">0</span>
            </div>
        </div>

        <!-- Landing feed (bottom right) -->
        <div id="landing-feed"></div>
    </div>

    <!-- ═══════════════════════════════════════════════════ -->
    <!-- RESULTS VIEW — Leaderboard                        -->
    <!-- ═══════════════════════════════════════════════════ -->
    <div id="results-view" class="view hidden">
        <div class="leaderboard-container">
            <div class="leaderboard-panel">
                <div class="leaderboard-header">
                    <h1>🏆 RESULTADOS</h1>
                    <p class="leaderboard-subtitle">Competição de Aterragem</p>
                </div>
                <div id="results-list"></div>
                <div class="leaderboard-footer">
                    <div id="auto-close-bar">
                        <div id="auto-close-progress"></div>
                    </div>
                    <p class="auto-close-text">Fecha em <span id="auto-close-time">20</span>s</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/hud.js"></script>
    <script src="js/results.js"></script>
</body>
</html>
